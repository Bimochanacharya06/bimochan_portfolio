<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <title>Bimo AI — Portfolio Assistant</title>
  
  <!-- Fonts & Libraries -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

  <style>
    /* =========================================
       1. BASE VARIABLES & SETUP
       ========================================= */
    :root {
      --bg: #09090b; /* Deep dark background */
      --surface: #18181b; /* Slightly lighter for cards */
      --surface-hover: #27272a;
      --border: #27272a;
      --border-glow: rgba(139, 92, 246, 0.3);
      
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      
      --accent-1: #8b5cf6; /* Purple */
      --accent-2: #ec4899; /* Pink */
      --accent-3: #10b981; /* Green */
      --error: #ef4444;
      
      --font-main: 'Outfit', sans-serif;
      --font-code: 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; background: var(--bg); color: var(--text-main); font-family: var(--font-main); overflow: hidden; }

    /* Background Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: 0; animation: float 20s ease-in-out infinite alternate; }
    .orb-1 { width: 500px; height: 500px; background: var(--accent-1); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent-2); bottom: -100px; right: -100px; animation-delay: -5s; }

    @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 30px); } }

    /* =========================================
       2. MAIN APP LAYOUT
       ========================================= */
    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(9, 9, 11, 0.6);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(24, 24, 27, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 20px; color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    .header-text h1 { font-size: 16px; font-weight: 600; }
    .header-text p { font-size: 12px; color: var(--accent-1); font-family: var(--font-code); }

    .header-actions button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-main); padding: 8px 16px; border-radius: 8px;
      font-family: var(--font-main); font-size: 13px; cursor: pointer; transition: 0.2s;
    }
    .header-actions button:hover { border-color: var(--accent-1); background: var(--surface-hover); }

    /* =========================================
       3. MESSAGES AREA
       ========================================= */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* Welcome Screen */
    .welcome-screen { margin: auto 0; text-align: center; padding: 40px 20px; }
    .welcome-icon { font-size: 40px; margin-bottom: 16px; animation: pulse 3s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .welcome-screen h2 { font-size: 24px; margin-bottom: 8px; }
    .welcome-screen p { color: var(--text-muted); margin-bottom: 24px; }
    
    .suggestion-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-main);
      padding: 10px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s;
    }
    .chip:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--accent-1); color: var(--accent-1); transform: translateY(-2px); }

    /* Message Bubbles */
    .msg { display: flex; gap: 16px; max-width: 90%; margin: 0 auto; width: 100%; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
    }
    .bot .msg-avatar { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: white; }
    .user .msg-avatar { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }

    .msg-content { flex: 1; min-width: 0; }
    .bubble {
      padding: 14px 18px; font-size: 15px; line-height: 1.6; border-radius: 18px; word-break: break-word;
    }
    .bot .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .user .bubble { background: rgba(139, 92, 246, 0.15); border: 1px solid var(--border-glow); border-top-right-radius: 4px; }

    /* Markdown Styling */
    .bubble h1, .bubble h2, .bubble h3 { margin: 16px 0 8px; color: var(--accent-1); }
    .bubble pre { background: #000 !important; border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 12px 0; }
    .bubble code { font-family: var(--font-code); font-size: 13px; }
    .bubble p { margin-bottom: 12px; }
    .bubble p:last-child { margin-bottom: 0; }

    /* =========================================
       4. INPUT AREA (MODERNIZED)
       ========================================= */
    .input-zone {
      padding: 16px 24px 24px;
      background: rgba(24, 24, 27, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }
    
    .input-toggles { display: flex; gap: 10px; margin-bottom: 12px; }
    .toggle-btn { background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; }
    .toggle-btn.active { color: var(--accent-3); }

    .input-box {
      display: flex; align-items: flex-end; gap: 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 12px; transition: 0.3s;
    }
    .input-box:focus-within { border-color: var(--accent-1); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }

    .attach-btn {
      background: none; border: none; color: var(--text-muted); padding: 10px; cursor: pointer;
      border-radius: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .attach-btn:hover { background: var(--surface); color: var(--accent-1); }

    .textarea-wrapper { flex: 1; display: flex; flex-direction: column; }
    #attach-badge { font-size: 11px; color: var(--accent-1); margin-bottom: 4px; display: none; }
    
    textarea {
      width: 100%; background: transparent; border: none; color: var(--text-main);
      font-family: var(--font-main); font-size: 15px; resize: none; outline: none;
      max-height: 150px; padding: 10px 0; line-height: 1.5;
    }

    .send-btn {
      width: 40px; height: 40px; border-radius: 14px; border: none; cursor: pointer;
      background: var(--text-main); color: var(--bg); display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Mobile Fixes */
    @media(max-width: 768px) {
      .app-container { border: none; border-radius: 0; max-width: 100%; }
      .msg { max-width: 100%; }
      .input-zone { padding: 12px 16px 20px; }
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="app-container">
    
    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <div class="logo">B</div>
        <div class="header-text">
          <h1>Bimo AI</h1>
          <p>Portfolio Assistant v4.0</p>
        </div>
      </div>
      <div class="header-actions">
        <button onclick="newChat()">✨ New Chat</button>
      </div>
    </header>

    <!-- CHAT AREA -->
    <main class="chat-area" id="chat-area">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">👋</div>
        <h2>Hello, I'm Bimo AI</h2>
        <p>I can answer questions about Bimochan, write code, or run Python scripts.</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendQuickMessage('Who is Bimochan Acharya?')">👤 About Bimochan</button>
          <button class="chip" onclick="sendQuickMessage('Write a Python script to reverse a string')">🐍 Python Test</button>
          <button class="chip" onclick="sendQuickMessage('Build a beautiful HTML CSS button')">🎨 Code UI</button>
        </div>
      </div>
    </main>

    <!-- INPUT AREA -->
    <footer class="input-zone">
      <div class="input-toggles">
        <button id="toggle-search" class="toggle-btn active" onclick="toggleOption('search')">🔍 Search: ON</button>
        <button id="toggle-code" class="toggle-btn active" onclick="toggleOption('code')">💻 Code: ON</button>
      </div>
      
      <div class="input-box">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach File">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="file-input" style="display: none;" onchange="handleFileUpload(this)" />

        <div class="textarea-wrapper">
          <span id="attach-badge">📎 File attached: <span id="attach-name"></span> (<span style="cursor:pointer; color:#ef4444;" onclick="clearFile()">Remove</span>)</span>
          <textarea id="chat-input" rows="1" placeholder="Message Bimo AI..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
        </div>

        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </footer>

  </div>

  <script>
    // ==========================================
    // JS LOGIC (Unminified & Organized)
    // ==========================================
    
    // API Endpoint config
    const API = "/api/chat";
    marked.setOptions({ breaks: true, gfm: true });

    // App State
    let chatHistory = [];
    let isSearchOn = true;
    let isCodeOn = true;
    let isBusy = false;
    let attachedText = "";
    let attachedName = "";

    // DOM Elements
    const chatArea = document.getElementById("chat-area");
    const chatInput = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");
    const welcomeScreen = document.getElementById("welcome-screen");

    // === UI UTILITIES ===
    function autoResize(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + "px";
    }

    function toggleOption(type) {
      if (type === 'search') {
        isSearchOn = !isSearchOn;
        document.getElementById("toggle-search").className = `toggle-btn ${isSearchOn ? 'active' : ''}`;
        document.getElementById("toggle-search").innerText = `🔍 Search: ${isSearchOn ? 'ON' : 'OFF'}`;
      } else {
        isCodeOn = !isCodeOn;
        document.getElementById("toggle-code").className = `toggle-btn ${isCodeOn ? 'active' : ''}`;
        document.getElementById("toggle-code").innerText = `💻 Code: ${isCodeOn ? 'ON' : 'OFF'}`;
      }
    }

    // === FILE UPLOADS ===
    function handleFileUpload(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 200000) return alert("File too large! Max 200KB.");
      
      const reader = new FileReader();
      reader.onload = (e) => {
        attachedText = e.target.result;
        attachedName = file.name;
        document.getElementById("attach-name").innerText = attachedName;
        document.getElementById("attach-badge").style.display = "block";
      };
      reader.readAsText(file);
      input.value = ""; // Reset input
    }

    function clearFile() {
      attachedText = "";
      attachedName = "";
      document.getElementById("attach-badge").style.display = "none";
    }

    // === CHAT LOGIC ===
    function newChat() {
      chatHistory = [];
      chatArea.innerHTML = "";
      chatArea.appendChild(welcomeScreen);
      welcomeScreen.style.display = "block";
    }

    function sendQuickMessage(text) {
      chatInput.value = text;
      autoResize(chatInput);
      sendMessage();
    }

    function handleEnter(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function appendMessage(role, text) {
      if (welcomeScreen) welcomeScreen.style.display = "none";

      const msgDiv = document.createElement("div");
      msgDiv.className = `msg ${role}`;
      
      // Render markdown for bot, escape HTML for user
      const renderedText = role === 'bot' ? marked.parse(text) : text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

      msgDiv.innerHTML = `
        <div class="msg-avatar">${role === "bot" ? "B" : "U"}</div>
        <div class="msg-content">
          <div class="bubble">${renderedText}</div>
        </div>
      `;
      chatArea.appendChild(msgDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msgDiv;
    }

    // This is the main API Caller - Kept exactly as you had it so it doesn't break Vercel!
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text && !attachedText) return;
      if (isBusy) return;

      isBusy = true;
      sendBtn.disabled = true;
      chatInput.value = "";
      autoResize(chatInput);

      let payloadText = text;
      if (attachedText) {
        payloadText = `[User attached file: ${attachedName}]\n\`\`\`\n${attachedText}\n\`\`\`\n\nUser Message: ${text}`;
        clearFile();
      }

      appendMessage("user", text || `[Sent attached file: ${attachedName}]`);
      chatHistory.push({ role: "user", content: payloadText });

      // Add a loading message
      const loadingDiv = appendMessage("bot", "Thinking...");
      
      try {
        const response = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: chatHistory,
            system: "You are Bimo AI, a helpful portfolio assistant for Bimochan Acharya."
          })
        });

        // Parse logic adapted perfectly from your original file
        const responseData = await response.json();
        let reply = "";
        
        if (responseData.statusCode !== undefined) {
          const bodyText = typeof responseData.body === 'string' ? responseData.body : JSON.stringify(responseData.body);
          const parsedBody = JSON.parse(bodyText);
          reply = parsedBody.reply;
        } else {
          reply = responseData.reply;
        }

        if (!reply) throw new Error("No response text received");

        // Remove loading and append real answer
        loadingDiv.remove();
        appendMessage("bot", reply);
        chatHistory.push({ role: "assistant", content: reply });

      } catch (error) {
        loadingDiv.remove();
        appendMessage("bot", `⚠️ Error: ${error.message}`);
        console.error(error);
      } finally {
        isBusy = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }
  </script>
</body>
</html>
