<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bimochan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:         #1e1e1e;
      --bg-raised:  #282828;
      --bg-hover:   #313131;
      --bg-active:  #383838;
      --bg-input:   #2c2c2c;
      --border:     rgba(255,255,255,0.08);
      --border-md:  rgba(255,255,255,0.13);
      --fg:         #efefef;
      --fg2:        #9a9a9a;
      --fg3:        #5a5a5a;
      --accent:     #d4a853;
      --accent-dim: rgba(212,168,83,0.12);
      --accent-2:   #c4963e;
      --danger:     #e05252;
      --danger-dim: rgba(224,82,82,0.10);
      --sans:       'DM Sans', sans-serif;
      --mono:       'DM Mono', monospace;
      --r-sm:       8px;
      --r-md:       12px;
      --r-lg:       16px;
      --r-xl:       20px;
      --sidebar:    268px;
      --topbar:     52px;
    }

    /* ── RESET ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── ROOT LAYOUT ── */
    .app {
      display: flex;
      height: 100dvh;
      width: 100vw;
      position: relative;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      z-index: 200;
      transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }

    /* Mobile: sidebar is a drawer */
    @media (max-width: 767px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        height: 100dvh;
        transform: translateX(-100%);
        box-shadow: 8px 0 40px rgba(0,0,0,0.45);
      }
      .sidebar.open { transform: translateX(0); }
    }

    /* Desktop: sidebar can be hidden by toggling */
    @media (min-width: 768px) {
      .sidebar.closed {
        transform: translateX(calc(-1 * var(--sidebar)));
        width: 0;
        border: none;
      }
    }

    /* ── sidebar backdrop (mobile only) ── */
    .backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity 0.26s ease;
    }
    .backdrop.show { display: block; opacity: 1; }

    /* ── sidebar header ── */
    .sb-head {
      padding: 14px 10px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px 10px;
    }
    .sb-logo-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .sb-logo-text { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .sb-logo-sub  { font-size: 10px; color: var(--fg3); font-family: var(--mono); margin-top: 1px; }

    .sb-new-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 12px; border-radius: var(--r-sm);
      border: 1px solid var(--border-md);
      background: transparent;
      color: var(--fg); font-family: var(--sans); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      width: 100%; text-align: left;
    }
    .sb-new-btn:hover { background: var(--bg-hover); }
    .sb-new-btn svg { flex-shrink: 0; color: var(--fg2); }

    /* ── history list ── */
    .sb-section-label {
      font-size: 10px; font-weight: 600;
      color: var(--fg3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 18px 6px;
      font-family: var(--mono);
      flex-shrink: 0;
    }

    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }
    .sb-list::-webkit-scrollbar { width: 3px; }
    .sb-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    /* ── history item ── */
    .hist-item {
      display: flex; align-items: center; gap: 0;
      border-radius: var(--r-sm);
      overflow: hidden;
      transition: background 0.15s;
      position: relative;
    }
    .hist-item:hover { background: var(--bg-hover); }
    .hist-item.active { background: var(--bg-active); }

    .hist-btn {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border: none; background: transparent;
      color: var(--fg2); font-family: var(--sans);
      font-size: 13px; font-weight: 400;
      cursor: pointer; text-align: left;
    }
    .hist-item.active .hist-btn { color: var(--fg); }
    .hist-item:hover .hist-btn { color: var(--fg); }

    .hist-icon { font-size: 13px; flex-shrink: 0; opacity: 0.7; }
    .hist-title {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      font-size: 13px;
    }

    /* delete button — hidden until hover */
    .hist-del {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border: none; background: transparent;
      color: var(--fg3);
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      opacity: 0; transition: opacity 0.15s, background 0.15s, color 0.15s;
      margin-right: 4px;
    }
    .hist-item:hover .hist-del { opacity: 1; }
    .hist-del:hover { background: var(--danger-dim); color: var(--danger); }

    /* ── sidebar footer ── */
    .sb-foot {
      padding: 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-profile {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: var(--r-sm);
      border: none; background: transparent;
      cursor: pointer; width: 100%; transition: background 0.15s;
    }
    .sb-profile:hover { background: var(--bg-hover); }
    .sb-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #111; flex-shrink: 0;
    }
    .sb-profile-info { flex: 1; text-align: left; }
    .sb-profile-name { font-size: 13px; font-weight: 600; color: var(--fg); }
    .sb-profile-role { font-size: 11px; color: var(--fg3); margin-top: 1px; }

    /* ══════════════════════════════
       MAIN
    ══════════════════════════════ */
    .main {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── topbar ── */
    .topbar {
      height: var(--topbar);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      z-index: 50;
    }
    .topbar-menu {
      width: 34px; height: 34px;
      border-radius: var(--r-sm);
      border: none; background: transparent;
      color: var(--fg2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .topbar-menu:hover { background: var(--bg-hover); color: var(--fg); }
    .topbar-title {
      flex: 1; font-size: 14px; font-weight: 600;
      color: var(--fg2); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .model-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 11px; border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 11px; font-family: var(--mono); color: var(--fg3);
      flex-shrink: 0;
    }
    .model-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 5px; }

    /* ── welcome screen ── */
    .welcome {
      max-width: 640px;
      margin: 0 auto;
      padding: 72px 24px 40px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      animation: fadeUp 0.45s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    .welcome-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 6px 28px rgba(212,168,83,0.25);
    }
    .welcome h1 {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.025em; text-align: center;
    }
    .welcome-sub {
      font-size: 14px; color: var(--fg2);
      text-align: center; line-height: 1.7;
      max-width: 420px;
    }
    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px; width: 100%; max-width: 560px;
    }
    .starter-card {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 15px;
      cursor: pointer; transition: border-color 0.18s, background 0.18s, transform 0.18s;
      text-align: left; display: flex; flex-direction: column; gap: 5px;
    }
    .starter-card:hover {
      border-color: rgba(212,168,83,0.35);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }
    .starter-card:active { transform: translateY(0); }
    .sc-icon { font-size: 17px; }
    .sc-title { font-size: 13px; font-weight: 600; color: var(--fg); }
    .sc-sub   { font-size: 12px; color: var(--fg2); line-height: 1.5; }

    /* ── messages ── */
    .messages {
      max-width: 740px;
      margin: 0 auto;
      padding: 8px 20px 160px;
      display: flex; flex-direction: column;
    }
    @media (max-width: 767px) {
      .messages { padding: 8px 14px 160px; }
    }

    .msg-row { padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .msg-row:last-child { border-bottom: none; }

    /* user */
    .msg-row.user { display: flex; justify-content: flex-end; }
    .user-bubble {
      background: var(--bg-raised);
      border: 1px solid var(--border-md);
      border-radius: 18px 18px 4px 18px;
      padding: 11px 16px;
      max-width: 78%;
      font-size: 14px; line-height: 1.75;
      word-break: break-word; white-space: pre-wrap;
    }
    @media (max-width: 767px) {
      .user-bubble { max-width: 90%; }
    }

    /* bot */
    .bot-msg { display: flex; gap: 12px; align-items: flex-start; }
    .bot-av {
      width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; margin-top: 2px;
      box-shadow: 0 0 10px rgba(212,168,83,0.2);
    }
    .bot-body { flex: 1; min-width: 0; }
    .bot-name {
      font-size: 11px; font-weight: 600;
      color: var(--accent); font-family: var(--mono);
      letter-spacing: 0.05em; margin-bottom: 7px;
    }

    /* markdown output */
    .bot-text { font-size: 14px; line-height: 1.8; word-break: break-word; }
    .bot-text p { margin-bottom: 10px; }
    .bot-text p:last-child { margin-bottom: 0; }
    .bot-text h1,.bot-text h2,.bot-text h3 { margin: 18px 0 8px; font-weight: 600; letter-spacing: -0.01em; }
    .bot-text h1 { font-size: 19px; } .bot-text h2 { font-size: 16px; } .bot-text h3 { font-size: 14px; }
    .bot-text ul,.bot-text ol { padding-left: 20px; margin-bottom: 10px; }
    .bot-text li { margin-bottom: 5px; line-height: 1.75; }
    .bot-text strong { font-weight: 600; color: var(--fg); }
    .bot-text em { color: var(--fg2); }
    .bot-text a { color: var(--accent); text-underline-offset: 3px; }
    .bot-text blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 14px; color: var(--fg2);
      margin: 12px 0; font-style: italic;
    }
    .bot-text table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; display: block; overflow-x: auto; }
    .bot-text th { background: var(--bg-raised); padding: 8px 13px; border: 1px solid var(--border-md); font-weight: 600; text-align: left; }
    .bot-text td { padding: 7px 13px; border: 1px solid var(--border); color: var(--fg2); }
    .bot-text hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .bot-text code:not([class]) {
      background: rgba(212,168,83,0.1); color: var(--accent);
      padding: 2px 6px; border-radius: 5px;
      font-family: var(--mono); font-size: 12.5px;
    }

    /* code blocks */
    .code-block { margin: 12px 0; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border-md); background: #141414; }
    .code-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 13px; background: #1c1c1c;
      border-bottom: 1px solid var(--border);
    }
    .code-lang { font-size: 11px; font-family: var(--mono); color: var(--fg3); text-transform: lowercase; }
    .code-btns { display: flex; gap: 5px; }
    .code-btn {
      border: none; background: rgba(255,255,255,0.05); color: var(--fg3);
      padding: 3px 10px; border-radius: 5px; font-size: 11px; cursor: pointer;
      transition: all 0.15s; font-family: var(--mono);
      display: flex; align-items: center; gap: 4px;
    }
    .code-btn:hover { background: rgba(255,255,255,0.09); color: var(--fg2); }
    .code-btn.run { color: var(--accent); background: var(--accent-dim); }
    .code-btn.run:hover { background: rgba(212,168,83,0.2); }
    .code-block pre { margin: 0; padding: 14px; overflow-x: auto; background: transparent !important; }
    .code-block code { font-family: var(--mono) !important; font-size: 12.5px; line-height: 1.65; }
    .code-term {
      background: #0e0e0e; border-top: 1px dashed rgba(255,255,255,0.06);
      padding: 10px 14px; font-family: var(--mono); font-size: 12px;
      color: var(--accent); display: none; white-space: pre-wrap;
      line-height: 1.5; max-height: 180px; overflow-y: auto;
    }
    .code-term::before { content: '$ '; opacity: 0.35; }
    .code-term.err { color: var(--danger); }

    /* msg action row */
    .msg-acts { display: flex; gap: 2px; margin-top: 10px; }
    .msg-act {
      border: none; background: transparent; color: var(--fg3);
      padding: 4px 8px; border-radius: 6px; cursor: pointer;
      font-size: 12px; transition: all 0.15s;
      display: flex; align-items: center; gap: 4px; font-family: var(--sans);
    }
    .msg-act:hover { background: var(--bg-hover); color: var(--fg2); }
    .msg-act.success { color: var(--accent); }

    /* ── thinking ── */
    .thinking-row { padding: 18px 0; }
    .thinking-msg { display: flex; gap: 12px; align-items: flex-start; }
    .thinking-body { display: flex; flex-direction: column; gap: 8px; }
    .thinking-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg3); }
    .t-dots { display: flex; gap: 3px; }
    .t-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); opacity: 0.6;
      animation: tdot 1.2s ease-in-out infinite;
    }
    .t-dots span:nth-child(2) { animation-delay: 0.2s; }
    .t-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.3} 30%{transform:translateY(-4px);opacity:1} }

    /* ══════════════════════════════
       INPUT ZONE
    ══════════════════════════════ */
    .input-zone {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 65%, transparent);
      z-index: 40;
    }
    .input-inner { max-width: 740px; margin: 0 auto; }

    /* ── attachment pills ── */
    .attach-pills {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 6px;
    }
    .attach-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg-raised);
      border: 1px solid var(--border-md);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 12px; color: var(--fg2);
      max-width: 200px;
    }
    .attach-pill-icon { font-size: 13px; flex-shrink: 0; }
    .attach-pill-name {
      flex: 1; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      font-family: var(--mono); font-size: 11px;
    }
    .attach-pill-rm {
      width: 16px; height: 16px; border-radius: 50%;
      border: none; background: var(--bg-hover);
      color: var(--fg3); font-size: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .attach-pill-rm:hover { background: var(--danger-dim); color: var(--danger); }

    /* ── input box ── */
    .input-box {
      background: var(--bg-input);
      border: 1px solid var(--border-md);
      border-radius: var(--r-lg);
      padding: 10px 10px 10px 14px;
      display: flex; align-items: flex-end; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .input-box:focus-within {
      border-color: rgba(212,168,83,0.4);
      box-shadow: 0 0 0 2px rgba(212,168,83,0.08), 0 2px 20px rgba(0,0,0,0.25);
    }

    .input-ta-wrap { flex: 1; display: flex; flex-direction: column; gap: 0; min-width: 0; }
    #chat-input {
      width: 100%; background: transparent; border: none;
      color: var(--fg); font-family: var(--sans); font-size: 14px;
      resize: none; outline: none;
      max-height: 180px; line-height: 1.65;
      padding: 2px 0;
      /* Fix iOS scroll bounce inside textarea */
      -webkit-overflow-scrolling: touch;
    }
    #chat-input::placeholder { color: var(--fg3); }

    .input-actions { display: flex; align-items: center; gap: 4px; align-self: flex-end; }
    .ia-btn {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      border: none; background: transparent; color: var(--fg3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .ia-btn:hover { background: var(--bg-hover); color: var(--fg2); }

    .send-btn {
      width: 34px; height: 34px; border-radius: 10px;
      border: none; background: var(--accent); color: #111;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, transform 0.15s, opacity 0.15s;
      box-shadow: 0 2px 10px rgba(212,168,83,0.3); flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-2); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn.stop { background: var(--danger); box-shadow: 0 2px 10px rgba(224,82,82,0.3); color: #fff; }
    .send-btn.stop:hover { background: #c94444; }

    .input-hint {
      text-align: center; font-size: 11px;
      color: var(--fg3); margin-top: 8px;
      line-height: 1.5;
    }

    /* ── preview modal ── */
    .preview-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .preview-overlay.show { opacity: 1; pointer-events: all; }
    .preview-modal {
      width: 94%; max-width: 1080px; height: 88dvh;
      background: #1a1a1a; border: 1px solid var(--border-md); border-radius: var(--r-xl);
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(0.97); transition: transform 0.22s ease;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }
    .preview-overlay.show .preview-modal { transform: scale(1); }
    .preview-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
    }
    .preview-title { font-size: 13px; font-weight: 600; color: var(--fg2); display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: blink 2s infinite; }
    .close-prev {
      border: 1px solid rgba(224,82,82,0.25); background: rgba(224,82,82,0.08);
      color: var(--danger); padding: 5px 13px; border-radius: 7px;
      cursor: pointer; font-size: 12px; font-family: var(--sans); font-weight: 600;
      transition: background 0.15s;
    }
    .close-prev:hover { background: rgba(224,82,82,0.18); }
    .preview-frame { flex: 1; width: 100%; border: none; background: #fff; }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--fg); color: var(--bg);
      padding: 7px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      opacity: 0; pointer-events: none; z-index: 999;
      transition: all 0.22s; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── mobile fixes ── */
    @media (max-width: 767px) {
      .starter-grid { grid-template-columns: 1fr; }
      .welcome { padding: 50px 16px 40px; }
      .input-zone { padding: 8px 10px max(12px, env(safe-area-inset-bottom)); }
      .preview-modal { width: 100%; height: 100dvh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="app">

      </button>

              id="chat-input"

<!-- hidden file input -->

<!-- toast -->

<script>
/* ════════════════════════════════
   CONFIG
════════════════════════════════ */
const API        = '/api/arccore';
const SK_SESS    = 'bim_sessions_v3';
const SK_MEM     = 'bim_memory_v3';

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let sessions     = load(SK_SESS, []);
let memory       = load(SK_MEM,  { lang: 'EN', count: 0 });
let currentId    = null;
let chatHistory  = [];
let isBusy       = false;
let abortCtrl    = null;
let attachments  = [];   // [{name, content, type}]
let pyReady      = null;
let thinkTimers  = [];

/* ════════════════════════════════
   STORAGE
════════════════════════════════ */
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save() {
  try {
    localStorage.setItem(SK_SESS, JSON.stringify(sessions.slice(0, 40)));
    localStorage.setItem(SK_MEM,  JSON.stringify(memory));
  } catch { /* storage full — silently skip */ }
  renderList();
}

/* ════════════════════════════════
   MARKED SETUP
════════════════════════════════ */
function setupMarked() {
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => {
    const language  = (lang || 'text').toLowerCase();
    const validLang = hljs.getLanguage(language) ? language : 'plaintext';
    let highlighted = '';
    try { highlighted = hljs.highlight(code, { language: validLang }).value; }
    catch { highlighted = esc(code); }

    const b64 = b64enc(code);
    const isWeb = ['html','xml'].includes(validLang) || /<!DOCTYPE|<html/i.test(code);
    const isScript = ['python','py','javascript','js'].includes(validLang);

    let btns = `<button class="code-btn" onclick="copyCode('${b64}',this)">Copy</button>`;
    if (isWeb)    btns = `<button class="code-btn run" onclick="openPreview('${b64}')">▶ Preview</button>` + btns;
    if (isScript) btns = `<button class="code-btn run" onclick="runCode(this,'${b64}','${validLang}')">▶ Run</button>` + btns;

    return `<div class="code-block">
      <div class="code-head">
        <span class="code-lang">${language}</span>
        <div class="code-btns">${btns}</div>
      </div>
      <pre><code class="hljs language-${validLang}">${highlighted}</code></pre>
      <div class="code-term"></div>
    </div>`;
  };
  marked.use({ renderer, breaks: true, gfm: true });
}

/* ════════════════════════════════
   BASE64 (unicode-safe)
════════════════════════════════ */
function b64enc(str) {
  try {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p) => String.fromCharCode('0x' + p)));
  } catch { return btoa(unescape(encodeURIComponent(str))); }
}
function b64dec(b64) {
  try {
    return decodeURIComponent(Array.from(atob(b64)).map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join(''));
  } catch { return atob(b64); }
}

/* ════════════════════════════════
   SESSIONS
════════════════════════════════ */
function newChat() {
  if (isBusy) stopGen();
  currentId    = 'c' + Date.now();
  chatHistory  = [];
  attachments  = [];
  renderAttachPills();
  sessions.unshift({ id: currentId, title: 'New chat', messages: [], agent: null });
  if (sessions.length > 40) sessions.pop();
  renderWelcome();
  document.getElementById('topbar-title').textContent = 'Bimochan AI';
  save();
  closeSidebar();
}

function loadSession(id) {
  if (isBusy) stopGen();
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  currentId    = id;
  chatHistory  = [...s.messages];
  attachments  = [];
  renderAttachPills();
  renderChatHistory();
  document.getElementById('topbar-title').textContent = s.title !== 'New chat' ? s.title : 'Bimochan AI';
  renderList();
  closeSidebar();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  save();
  if (id === currentId) newChat();
}

function updateSession(agentName) {
  const s = sessions.find(x => x.id === currentId);
  if (!s) return;
  s.messages = [...chatHistory];
  if (agentName) s.agent = agentName;
  const first = chatHistory.find(m => m.role === 'user');
  if (first && s.title === 'New chat') {
    s.title = first.content.replace(/\[.*?\]/g, '').trim().slice(0, 38) + (first.content.length > 38 ? '…' : '');
    document.getElementById('topbar-title').textContent = s.title;
  }
  save();
}

/* ════════════════════════════════
   RENDER LIST
════════════════════════════════ */
const AGENT_ICON = { codeCore:'💻', researchCore:'🔍', writeCore:'✍️', legalCore:'⚖️', dataCore:'📊', stratCore:'🚀' };

function renderList() {
  const el = document.getElementById('sb-list');
  const visible = sessions.filter(s => s.messages.length > 0 || s.id === currentId);
  if (visible.length === 0) {
    el.innerHTML = `<div style="padding:16px 12px;font-size:12px;color:var(--fg3)">No chats yet</div>`;
    return;
  }
  el.innerHTML = visible.map(s => `
    <div class="hist-item ${s.id === currentId ? 'active' : ''}">
      <button class="hist-btn" onclick="loadSession('${s.id}')">
        <span class="hist-icon">${AGENT_ICON[s.agent] || '💬'}</span>
        <span class="hist-title">${esc(s.title)}</span>
      </button>
      <button class="hist-del" onclick="deleteSession('${s.id}',event)" title="Delete chat">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`).join('');
}

/* ════════════════════════════════
   RENDER CHAT
════════════════════════════════ */
function getOrCreateMsgWrap() {
  const wrap = document.getElementById('chat-wrap');
  let msgs = wrap.querySelector('.messages');
  if (!msgs) {
    wrap.innerHTML = '';
    msgs = document.createElement('div');
    msgs.className = 'messages';
    wrap.appendChild(msgs);
  }
  return msgs;
}

function renderWelcome() {
  const STARTERS = [
    { icon:'👤', title:'Who is Bimochan?',     sub:'Skills, projects, background',        q:'Who is Bimochan Acharya? Tell me about his projects and skills.' },
    { icon:'🔍', title:'Search the web',        sub:'Real-time info and latest news',       q:'What are the most important AI developments this week?' },
    { icon:'💻', title:'Build something',        sub:'Code, apps, scripts, components',      q:'Build a beautiful animated landing page for a tech startup in HTML.' },
    { icon:'📊', title:'Real-time data',         sub:'Markets, crypto, weather and more',    q:'What is Bitcoin\'s current price and recent market trend?' },
  ];
  document.getElementById('chat-wrap').innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">⚡</div>
      <h1>Bimochan AI</h1>
      <p class="welcome-sub">Portfolio agent — web search, code, real-time data, and everything about Bimochan.</p>
      <div class="starter-grid">
        ${STARTERS.map(s => `
          <div class="starter-card" onclick="quickSend(${JSON.stringify(s.q)})">
            <div class="sc-icon">${s.icon}</div>
            <div class="sc-title">${s.title}</div>
            <div class="sc-sub">${s.sub}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderChatHistory() {
  const wrap = document.getElementById('chat-wrap');
  if (chatHistory.length === 0) { renderWelcome(); return; }
  wrap.innerHTML = '';
  const msgs = document.createElement('div');
  msgs.className = 'messages';
  chatHistory.forEach(m => {
    if (m.role === 'user') msgs.appendChild(buildUserRow(m.content));
    else msgs.appendChild(buildBotRow(m.content, m.progressLog));
  });
  wrap.appendChild(msgs);
  scrollBottom();
}

/* ════════════════════════════════
   MESSAGE BUILDERS
════════════════════════════════ */
function buildUserRow(text) {
  const div = document.createElement('div');
  div.className = 'msg-row user';
  div.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
  return div;
}

function buildBotRow(text, progressLog, live = false) {
  const div = document.createElement('div');
  div.className = 'msg-row';

  let rendered = '';
  try { rendered = marked.parse(text); } catch { rendered = `<p>${esc(text)}</p>`; }

  const b64 = b64enc(text);
  const acts = live ? '' : `
    <div class="msg-acts">
      <button class="msg-act" onclick="copyMsg('${b64}',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="msg-act" onclick="retryLast()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Retry
      </button>
    </div>`;

  div.innerHTML = `
    <div class="bot-msg">
      <div class="bot-av">⚡</div>
      <div class="bot-body">
        <div class="bot-name">ARCCORE</div>
        <div class="bot-text">${rendered}</div>
        ${acts}
      </div>
    </div>`;
  return div;
}

/* ════════════════════════════════
   THINKING UI
════════════════════════════════ */
const THINK_STEPS = [
  { t: 0,    label: 'Thinking…' },
  { t: 1200, label: 'Searching the web…' },
  { t: 3500, label: 'Analyzing results…' },
  { t: 6000, label: 'Generating response…' },
];

function addThinking(msgs) {
  const row = document.createElement('div');
  row.className = 'thinking-row'; row.id = 'thinking-row';
  row.innerHTML = `
    <div class="thinking-msg">
      <div class="bot-av">⚡</div>
      <div class="thinking-body">
        <div class="bot-name">ARCCORE</div>
        <div class="thinking-status">
          <div class="t-dots"><span></span><span></span><span></span></div>
          <span id="think-label">Thinking…</span>
        </div>
      </div>
    </div>`;
  msgs.appendChild(row);
  scrollBottom();
  const lbl = document.getElementById('think-label');
  THINK_STEPS.forEach(s => {
    const t = setTimeout(() => { if (lbl) lbl.textContent = s.label; }, s.t);
    thinkTimers.push(t);
  });
}

function removeThinking() {
  thinkTimers.forEach(clearTimeout); thinkTimers = [];
  document.getElementById('thinking-row')?.remove();
}

/* ════════════════════════════════
   SEND
════════════════════════════════ */
function quickSend(text) { document.getElementById('chat-input').value = text; handleSend(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }
function stopGen() { abortCtrl?.abort(); }

async function handleSend() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text && attachments.length === 0) return;
  if (isBusy) return;

  input.value = ''; autoResize(input);

  // Build payload with attachments
  let payload = text;
  if (attachments.length > 0) {
    const parts = attachments.map(a => `[File: ${a.name}]\n\`\`\`\n${a.content}\n\`\`\``);
    payload = parts.join('\n\n') + (text ? '\n\n' + text : '\n\nPlease analyze the attached file(s).');
    attachments = [];
    renderAttachPills();
  }

  chatHistory.push({ role: 'user', content: payload });
  updateSession(null);

  const msgs = getOrCreateMsgWrap();
  msgs.appendChild(buildUserRow(payload));
  addThinking(msgs);

  await runAPI(msgs);
}

/* ════════════════════════════════
   API CALL
════════════════════════════════ */
async function runAPI(msgs) {
  isBusy = true;
  const btn = document.getElementById('send-btn');

  // Switch to stop button
  btn.classList.add('stop');
  btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`;
  btn.onclick = stopGen;

  abortCtrl = new AbortController();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortCtrl.signal,
      body: JSON.stringify({
        messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
      }),
    });

    // Safe JSON parse
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch {
      throw new Error(`Server returned non-JSON (status ${res.status}). Check that /api/arccore exists and the function is deployed.`);
    }

    // Surface error from API
    if (!res.ok || data.status === 'error') {
      throw new Error(data.error || data.reply || `HTTP ${res.status}`);
    }

    let reply = data.reply;
    if (!reply) throw new Error('Empty response from ArcCore');

    removeThinking();
    chatHistory.push({ role: 'assistant', content: reply, progressLog: data.progressLog || null });
    updateSession(data.intent || null);
    if (data.language) memory.lang = data.language;
    memory.count = (memory.count || 0) + 1;
    save();

    msgs.appendChild(buildBotRow(reply, data.progressLog));
    scrollBottom();

  } catch (err) {
    removeThinking();
    const isAbort = err.name === 'AbortError';
    const msg = isAbort ? '*Stopped.*' : `**Error:** ${esc(err.message)}`;
    msgs.appendChild(buildBotRow(msg, null));
    scrollBottom();
    if (!isAbort) chatHistory.pop(); // remove last user msg so user can retry cleanly
  } finally {
    isBusy = false; abortCtrl = null;
    btn.classList.remove('stop');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
    btn.onclick = handleSend;
    document.getElementById('chat-input').focus();
  }
}

async function retryLast() {
  if (isBusy || chatHistory.length === 0) return;
  if (chatHistory.at(-1).role === 'assistant') chatHistory.pop();
  renderChatHistory();
  const msgs = getOrCreateMsgWrap();
  addThinking(msgs);
  await runAPI(msgs);
}

/* ════════════════════════════════
   ATTACHMENT PILLS
════════════════════════════════ */
function triggerFile() { document.getElementById('file-input').click(); }

function handleFile(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    if (file.size > 500_000) { toast(`${file.name} is too large (max 500KB)`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      attachments.push({ name: file.name, content: e.target.result, type: file.type });
      renderAttachPills();
    };
    reader.readAsText(file);
  });
  input.value = '';
}

function removeAttachment(idx) {
  attachments.splice(idx, 1);
  renderAttachPills();
}

function renderAttachPills() {
  const container = document.getElementById('attach-pills');
  if (attachments.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = attachments.map((a, i) => `
    <div class="attach-pill">
      <span class="attach-pill-icon">${fileIcon(a.name)}</span>
      <span class="attach-pill-name">${esc(a.name)}</span>
      <button class="attach-pill-rm" onclick="removeAttachment(${i})" title="Remove">✕</button>
    </div>`).join('');
}

function fileIcon(name) {
  const ext = name.split('.').pop()?.toLowerCase();
  const map = { py:'🐍', js:'⚡', ts:'⚡', html:'🌐', css:'🎨', json:'📋', md:'📝', txt:'📄', csv:'📊', pdf:'📑' };
  return map[ext] || '📄';
}

/* ════════════════════════════════
   CODE ACTIONS
════════════════════════════════ */
async function copyCode(b64, btn) {
  try { await navigator.clipboard.writeText(b64dec(b64)); }
  catch { /* fallback */ }
  const orig = btn.textContent;
  btn.textContent = '✓ Copied'; btn.classList.add('success');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 2000);
}

async function copyMsg(b64, btn) {
  try { await navigator.clipboard.writeText(b64dec(b64)); }
  catch { /* fallback */ }
  btn.classList.add('success');
  const orig = btn.innerHTML;
  btn.innerHTML = '✓ Copied';
  setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = orig; }, 2000);
}

function openPreview(b64) {
  document.getElementById('preview-frame').srcdoc = b64dec(b64);
  document.getElementById('preview-overlay').classList.add('show');
}
function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
  document.getElementById('preview-frame').srcdoc = '';
}

async function initPy() {
  if (!window.loadPyodide) {
    await new Promise(res => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
      s.onload = res; document.head.appendChild(s);
    });
  }
  const py = await loadPyodide();
  py.runPython(`import sys,io\nsys.stdout=io.StringIO()\nsys.stderr=io.StringIO()`);
  return py;
}

async function runCode(btn, b64, lang) {
  const code     = b64dec(b64);
  const terminal = btn.closest('.code-block').querySelector('.code-term');
  terminal.style.display = 'block';
  terminal.classList.remove('err');

  if (lang === 'js' || lang === 'javascript') {
    let out = ''; const og = console.log;
    try {
      console.log = (...a) => { out += a.join(' ') + '\n'; };
      const r = new Function(code)();
      if (r !== undefined) out += '→ ' + r;
      terminal.textContent = out || '(no output)';
    } catch(e) { terminal.classList.add('err'); terminal.textContent = e.toString(); }
    finally { console.log = og; }
    return;
  }

  if (lang === 'py' || lang === 'python') {
    terminal.textContent = 'Loading Python…';
    try {
      if (!pyReady) pyReady = initPy();
      const py = await pyReady;
      py.runPython(`sys.stdout.truncate(0);sys.stdout.seek(0);sys.stderr.truncate(0);sys.stderr.seek(0)`);
      await py.runPythonAsync(code);
      const out = py.runPython('sys.stdout.getvalue()');
      const err = py.runPython('sys.stderr.getvalue()');
      if (err) { terminal.classList.add('err'); terminal.textContent = err; }
      else terminal.textContent = out || '(no output)';
    } catch(e) { terminal.classList.add('err'); terminal.textContent = e.toString(); }
  }
}

/* ════════════════════════════════
   SIDEBAR TOGGLE
════════════════════════════════ */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  if (window.innerWidth < 768) {
    sb.classList.toggle('open');
    bd.classList.toggle('show');
  } else {
    sb.classList.toggle('closed');
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

/* ════════════════════════════════
   UTILS
════════════════════════════════ */
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
}
function scrollBottom() {
  requestAnimationFrame(() => {
    const ca = document.getElementById('chat-area');
    ca.scrollTop = ca.scrollHeight;
  });
}
function esc(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  setupMarked();
  renderList();
  if (sessions.length > 0 && sessions[0].messages.length > 0) {
    loadSession(sessions[0].id);
  } else {
    currentId = 'c' + Date.now();
    sessions.unshift({ id: currentId, title: 'New chat', messages: [], agent: null });
    renderWelcome();
    save();
  }
});

/* Fix mobile: prevent input from scrolling the page when keyboard opens */
document.getElementById('chat-input')?.addEventListener('focus', () => {
  setTimeout(scrollBottom, 350);
});
