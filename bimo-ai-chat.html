<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <title>Bimo AI — Portfolio Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

  <!-- Load libs first (no defer) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Fallbacks so app never crashes if CDN fails -->
  <script>
    if (typeof marked === "undefined") {
      window.marked = {
        parse: (s) => String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br>"),
        setOptions: () => {}
      };
      console.warn("marked CDN unavailable. Fallback parser enabled.");
    }

    if (typeof hljs === "undefined") {
      window.hljs = {
        getLanguage: () => false,
        highlight: (codeObj) => ({ value: codeObj?.code || "" }),
        highlightAuto: (code) => ({ value: code || "" })
      };
      console.warn("highlight.js CDN unavailable. Fallback highlighter enabled.");
    }
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#07070d;--surface:#0f0f18;--surface2:#161622;--surface3:#1d1d2e;
      --border:#252538;--border2:#2e2e45;--accent:#7c6fff;--accent2:#ff6b8a;--accent3:#00d4aa;
      --text:#eaeaf8;--text2:#a0a0c8;--muted:#606080;--glow:rgba(124,111,255,.12);--code-bg:#0a0a14;
      --search-clr:#fbbf24;--mem-clr:#34d399;--danger:#f87171;
    }
    html[data-theme="light"]{
      --bg:#f6f7fb;--surface:#ffffff;--surface2:#f8f9ff;--surface3:#eef0fa;
      --border:#e3e6f2;--border2:#d5d9ea;--accent:#6759ff;--accent2:#ff5f85;--accent3:#00b894;
      --text:#1a1c28;--text2:#50556e;--muted:#7b8098;--glow:rgba(103,89,255,.12);--code-bg:#f2f4ff;
      --search-clr:#b8890a;--mem-clr:#0e9f6e;--danger:#d63a3a;
    }
    html,body{height:100%;overflow:hidden}
    body{
      background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);
      display:flex;align-items:center;justify-content:center;
    }
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse at 15% 40%,rgba(124,111,255,.06) 0%,transparent 55%),
        radial-gradient(ellipse at 85% 10%,rgba(255,107,138,.04) 0%,transparent 50%);
    }
    .app{
      position:relative;z-index:1;width:100%;max-width:1180px;height:100dvh;
      display:grid;grid-template-columns:280px 1fr;background:var(--surface);overflow:hidden;
    }
    @media(max-width:980px){.app{grid-template-columns:1fr}}
    @media(min-width:1000px){
      .app{
        height:94vh;max-height:980px;border-radius:22px;border:1px solid var(--border2);
        box-shadow:0 0 80px var(--glow),0 40px 100px rgba(0,0,0,.18);
      }
    }

    .sidebar{border-right:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;min-width:0}
    @media(max-width:980px){
      .sidebar{position:absolute;left:0;top:0;bottom:0;width:280px;z-index:30;transform:translateX(-100%);transition:.25s}
      .sidebar.open{transform:translateX(0)}
    }
    .shead{padding:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
    .sbtn{
      font-size:11px;padding:8px 10px;border-radius:10px;border:1px solid var(--border2);
      background:var(--surface3);color:var(--text2);cursor:pointer
    }
    .sbtn.primary{background:rgba(124,111,255,.14);border-color:rgba(124,111,255,.35);color:var(--accent)}
    .sbtn:hover{border-color:var(--accent);color:var(--accent)}
    .slist{padding:10px;overflow:auto;display:flex;flex-direction:column;gap:8px}
    .sitem{border:1px solid var(--border2);background:var(--surface);border-radius:10px;padding:8px;display:flex;gap:8px;align-items:flex-start}
    .smain{flex:1;min-width:0;cursor:pointer}
    .stitle{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .smeta{font-size:9px;color:var(--muted);margin-top:4px}
    .sact{display:flex;flex-direction:column;gap:6px}
    .si{
      font-size:9px;padding:4px 6px;border-radius:6px;border:1px solid var(--border2);
      background:var(--surface3);color:var(--text2);cursor:pointer
    }

    .main{display:flex;flex-direction:column;min-width:0}
    .header{
      display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .logo{
      width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));font-family:'Syne',sans-serif;font-weight:800;color:#fff;position:relative;
    }
    .logo-ping{position:absolute;right:-2px;top:-2px;width:9px;height:9px;border-radius:50%;background:#4ade80;border:2px solid var(--surface2)}
    .hinfo{flex:1;min-width:0}
    .hname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    .hsub{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hactions{display:flex;gap:6px;flex-wrap:wrap}
    .hbtn{
      font-size:10px;padding:6px 9px;border-radius:9px;border:1px solid var(--border2);
      background:var(--surface3);color:var(--text2);cursor:pointer
    }
    .hbtn:hover{border-color:var(--accent);color:var(--accent)}

    .hero{
      margin:12px 14px 0;border:1px solid var(--border2);border-radius:14px;padding:12px;
      background:linear-gradient(180deg, rgba(124,111,255,.09), rgba(124,111,255,.03));
    }
    .hero-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .hero-sub{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
    .hero-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
    .hero-btn{
      font-size:11px;padding:7px 10px;border-radius:10px;border:1px solid var(--border2);
      background:var(--surface3);color:var(--text2);cursor:pointer
    }
    .hero-btn.primary{background:rgba(124,111,255,.16);color:#dcd7ff;border-color:rgba(124,111,255,.45)}

    .messages{
      flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;
    }
    .msg{display:flex;gap:10px}
    .msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:85%}
    .msg.bot{align-self:flex-start;max-width:96%}
    .mavatar{
      width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;flex-shrink:0
    }
    .bot .mavatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .user .mavatar{background:var(--surface3);border:1px solid var(--border2);color:var(--muted)}
    .bwrap{display:flex;flex-direction:column;gap:5px;min-width:0}
    .bubble{padding:12px 14px;border-radius:15px;font-size:13px;line-height:1.72;word-break:break-word}
    .bot .bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:5px}
    .user .bubble{background:var(--accent);color:#fff;border-top-right-radius:5px}
    .mmeta{font-size:9px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .msg.user .mmeta{justify-content:flex-end}
    .meta-btn{
      font-size:9px;padding:2px 7px;border-radius:999px;border:1px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer
    }

    .typing .bubble{padding:13px 16px}
    .dots{display:flex;gap:4px}
    .dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bdot 1.2s infinite}
    .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
    @keyframes bdot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

    .spill{display:inline-flex;align-items:center;gap:5px;font-size:9px;padding:3px 8px;border-radius:999px;width:fit-content}
    .spill-search{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.28);color:var(--search-clr)}
    .spill-code{background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.22);color:var(--accent)}
    .spill-mem{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:var(--mem-clr)}

    .bubble h1,.bubble h2,.bubble h3{font-family:'Syne',sans-serif;margin:10px 0 6px}
    .bubble h1{font-size:16px}.bubble h2{font-size:14px}.bubble h3{font-size:13px;color:var(--accent)}
    .bubble p{margin:5px 0}
    .bubble ul,.bubble ol{padding-left:18px;margin:7px 0}
    .bubble code:not(pre code){background:var(--code-bg);border:1px solid var(--border2);border-radius:5px;padding:1px 6px;font-size:12px;color:#ff8fa3}
    .cblock{margin:10px 0;border-radius:12px;overflow:hidden;border:1px solid var(--border2)}
    .chead{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#090914;border-bottom:1px solid var(--border2)}
    .clang{font-size:10px;color:var(--accent)}
    .cactions{display:flex;gap:6px}
    .cbtn{font-size:9px;padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer}
    .cblock pre{margin:0!important;background:var(--code-bg)!important;padding:14px!important;overflow-x:auto}

    .izone{background:var(--surface2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
    .itoolbar{display:flex;align-items:center;gap:7px;padding:9px 12px 0}
    .itoggle{font-size:9px;padding:5px 10px;border-radius:999px;border:1px solid var(--border2);background:var(--surface3);color:var(--muted);cursor:pointer}
    .itoggle.on{border-color:var(--accent3);color:var(--accent3)}
    .icount{font-size:9px;color:var(--muted);margin-left:auto}
    .irow{display:flex;align-items:flex-end;gap:9px;padding:9px 12px 12px}
    .ifield{
      flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:14px;padding:10px 12px;
      color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;min-height:44px;max-height:150px;outline:none
    }
    .sbtn-send,.sbtn-stop,.sbtn-regen{
      height:44px;border:none;border-radius:12px;cursor:pointer;padding:0 12px;font-size:11px;font-weight:600
    }
    .sbtn-send{width:44px;background:linear-gradient(135deg,var(--accent),#9b59ff);display:flex;align-items:center;justify-content:center}
    .sbtn-stop{background:rgba(248,113,113,.2);color:var(--danger);border:1px solid rgba(248,113,113,.35)}
    .sbtn-regen{background:rgba(124,111,255,.18);color:var(--accent);border:1px solid rgba(124,111,255,.35)}
    .hide{display:none!important}

    .footer{text-align:center;font-size:9px;color:var(--muted);padding:6px;letter-spacing:.05em}
    .toast{
      position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(14px);
      background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:8px 14px;font-size:11px;
      opacity:0;transition:.2s;pointer-events:none;z-index:60
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="shead">
      <button class="sbtn primary" onclick="newChat()">➕ New</button>
      <button class="sbtn" onclick="toggleThemeMode()">🌓 Theme</button>
      <button class="sbtn" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="slist" id="historyList"></div>
  </aside>

  <main class="main">
    <div class="header">
      <button class="hbtn" onclick="toggleSidebar()">☰</button>
      <div class="logo">B<div class="logo-ping"></div></div>
      <div class="hinfo">
        <div class="hname">Bimo AI — Portfolio Assistant</div>
        <div class="hsub">Streaming · Regenerate · Stop · History · Auto Theme</div>
      </div>
      <div class="hactions">
        <button class="hbtn" onclick="newChat()">New Chat</button>
      </div>
    </div>

    <div class="hero" id="heroCard">
      <div class="hero-title">Welcome 👋</div>
      <div class="hero-sub">Ask for code, debugging, architecture, or live web research.</div>
      <div class="hero-actions">
        <button class="hero-btn primary" onclick="sendChip('Build a complete Django REST API with JWT auth and CRUD operations')">Build API</button>
        <button class="hero-btn" onclick="sendChip('Debug this and explain: \n\n```python\n\n```')">Debug</button>
        <button class="hero-btn" onclick="sendChip('Search: latest web dev trends 2026')">Search</button>
      </div>
    </div>

    <div class="messages" id="messages" role="log" aria-live="polite"></div>

    <div class="izone">
      <div class="itoolbar">
        <button class="itoggle on" id="searchToggle" onclick="toggleSearch()">🔍 Search: ON</button>
        <button class="itoggle on" id="codeToggle" onclick="toggleCode()">💻 Code: ON</button>
        <div class="icount" id="charCount">0 / 2000</div>
      </div>
      <div class="irow">
        <textarea class="ifield" id="input" rows="1" maxlength="2000" placeholder="Ask anything..."></textarea>
        <button class="sbtn-regen hide" id="regenBtn" onclick="regenerateLast()">Regenerate</button>
        <button class="sbtn-stop hide" id="stopBtn" onclick="stopGenerating()">Stop</button>
        <button class="sbtn-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="footer">🔒 secured · Bimochan Acharya · <a href="mailto:bimochan081b@asm.edu.np">Contact</a></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL="/api/chat";
const THEME_KEY="bimo_theme_v1";
const CHAT_STORE_KEY="bimo_chat_sessions_v2";
const MEM_KEY="bimo_memory_v2";

let history=[],searchOn=true,codeOn=true,loading=false;
let sessions=[],currentSessionId=null;
let memory=[];
let activeController=null;
let lastUserPrompt="";

try{sessions=JSON.parse(localStorage.getItem(CHAT_STORE_KEY)||"[]")}catch{sessions=[]}
try{memory=JSON.parse(localStorage.getItem(MEM_KEY)||"[]")}catch{memory=[]}

marked.setOptions({breaks:true,gfm:true});

const inputEl=document.getElementById("input");
const messagesEl=document.getElementById("messages");
const charCountEl=document.getElementById("charCount");
const sendBtn=document.getElementById("sendBtn");
const stopBtn=document.getElementById("stopBtn");
const regenBtn=document.getElementById("regenBtn");
const sidebar=document.getElementById("sidebar");
const heroCard=document.getElementById("heroCard");

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2100)}
function resize(){inputEl.style.height="auto";inputEl.style.height=Math.min(inputEl.scrollHeight,150)+"px"}
function timeNow(){return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}
function escapeHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function saveSessions(){localStorage.setItem(CHAT_STORE_KEY,JSON.stringify(sessions))}
function uid(){return "chat_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function nowISO(){return new Date().toISOString()}
function humanTime(iso){const d=new Date(iso);return d.toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function buildTitle(msgs){const u=msgs.find(m=>m.role==="user")?.content?.trim()||"New chat";return u.length>40?u.slice(0,40)+"…":u}
function getSession(){return sessions.find(s=>s.id===currentSessionId)||null}
function persistCurrent(){
  let s=getSession();
  if(!s){s={id:uid(),title:"New chat",created_at:nowISO(),updated_at:nowISO(),messages:[]};sessions.unshift(s);currentSessionId=s.id}
  s.messages=history;s.title=buildTitle(history);s.updated_at=nowISO();
  sessions=[s,...sessions.filter(x=>x.id!==s.id)];
  saveSessions();renderHistory();
}
function renderHistory(){
  const wrap=document.getElementById("historyList");
  if(!sessions.length){wrap.innerHTML=`<div class="sitem"><div class="smain"><div class="stitle">No chats yet</div></div></div>`;return;}
  wrap.innerHTML=sessions.map(s=>`
    <div class="sitem">
      <div class="smain" onclick="loadSession('${s.id}')">
        <div class="stitle">${escapeHtml(s.title)}</div>
        <div class="smeta">${humanTime(s.updated_at)} · ${(s.messages||[]).length} msgs</div>
      </div>
      <div class="sact">
        <button class="si" onclick="loadSession('${s.id}')">Open</button>
        <button class="si" onclick="deleteSession('${s.id}')">Del</button>
      </div>
    </div>
  `).join("");
}
function loadSession(id){
  const s=sessions.find(x=>x.id===id); if(!s) return;
  currentSessionId=id; history=[...(s.messages||[])];
  messagesEl.innerHTML="";
  if(!history.length){heroCard.classList.remove("hide");appendWelcome();}
  else{
    heroCard.classList.add("hide");
    history.forEach(m=>appendMsg(m.role==="assistant"?"bot":"user",m.content,{raw:m.role==="user"}));
  }
  renderHistory();
}
function deleteSession(id){
  sessions=sessions.filter(s=>s.id!==id);
  if(currentSessionId===id){currentSessionId=null;history=[];newChat();}
  saveSessions();renderHistory();
}
function newChat(){
  history=[];currentSessionId=null;messagesEl.innerHTML="";
  heroCard.classList.remove("hide");appendWelcome();persistCurrent();renderHistory();
}
function appendWelcome(){appendMsg("bot","Hey! I’m **Bimo AI**. Tell me what you want to build and I’ll help step-by-step.");}
function toggleSidebar(){sidebar.classList.toggle("open")}
function toggleSearch(){searchOn=!searchOn;const b=document.getElementById("searchToggle");b.textContent=`🔍 Search: ${searchOn?"ON":"OFF"}`;b.className="itoggle"+(searchOn?" on":"")}
function toggleCode(){codeOn=!codeOn;const b=document.getElementById("codeToggle");b.textContent=`💻 Code: ${codeOn?"ON":"OFF"}`;b.className="itoggle"+(codeOn?" on":"")}
function sendChip(t){inputEl.value=t;resize();sendMessage()}
function wantsSearch(t){return searchOn && /search:|latest|current|2025|2026|news|today|price|who is|recent|trend/i.test(t)}
function wantsCode(t){return codeOn && /write|build|create|code|implement|function|class|api|script|django|flask|javascript|python|debug|fix|error/i.test(t)}

function sanitizeHTML(html){
  const d=new DOMParser().parseFromString(html,"text/html");
  d.querySelectorAll("script,iframe,object,embed").forEach(n=>n.remove());
  d.querySelectorAll("*").forEach(el=>{
    [...el.attributes].forEach(a=>{
      const n=a.name.toLowerCase(),v=(a.value||"").toLowerCase();
      if(n.startsWith("on"))el.removeAttribute(a.name);
      if((n==="href"||n==="src")&&v.startsWith("javascript:"))el.removeAttribute(a.name);
    });
  });
  return d.body.innerHTML;
}

function renderMd(text){
  const processed=(text||"").replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const l=(lang||"text").toLowerCase(),raw=(code||"").trim();
    const highlighted=(window.hljs&&hljs.getLanguage(l))
      ?hljs.highlight(raw,{language:l}).value
      :(window.hljs?hljs.highlightAuto(raw).value:escapeHtml(raw));
    const enc=encodeURIComponent(raw);
    return `<div class="cblock"><div class="chead"><span class="clang">${l.toUpperCase()}</span><div class="cactions"><button class="cbtn" onclick="copyCode(this,'${enc}')">Copy</button></div></div><pre><code>${highlighted}</code></pre></div>`;
  });
  return sanitizeHTML(marked.parse(processed));
}
async function copyCode(btn,enc){try{await navigator.clipboard.writeText(decodeURIComponent(enc));btn.textContent="Copied";setTimeout(()=>btn.textContent="Copy",1200)}catch{}}
function copyAnswer(btn){const bubble=btn.closest(".bwrap")?.querySelector(".bubble");if(!bubble)return;navigator.clipboard.writeText(bubble.innerText||"");btn.textContent="Copied";setTimeout(()=>btn.textContent="Copy answer",1000)}

function appendMsg(role,content,opts={}){
  const div=document.createElement("div");
  div.className=`msg ${role}${opts.typing?" typing":""}`;
  let pills="";
  if(opts.searching)pills+=`<div class="spill spill-search">🔍 Searching web…</div>`;
  if(opts.memory)pills+=`<div class="spill spill-mem">🧠 Memory…</div>`;
  if(opts.coding)pills+=`<div class="spill spill-code">💻 Code mode…</div>`;
  const inner=opts.typing?`<div class="dots"><span></span><span></span><span></span></div>`:(opts.raw?escapeHtml(content):renderMd(content));
  const copyBtn=(role==="bot"&&!opts.typing)?`<button class="meta-btn" onclick="copyAnswer(this)">Copy answer</button>`:"";
  div.innerHTML=`<div class="mavatar">${role==="bot"?"B":"U"}</div><div class="bwrap">${pills}<div class="bubble">${inner}</div>${!opts.typing?`<div class="mmeta">${timeNow()} · 🔒 Secure ${copyBtn}</div>`:""}</div>`;
  messagesEl.appendChild(div);messagesEl.scrollTop=messagesEl.scrollHeight;return div;
}

function buildSystem(){
  return `You are Bimo AI assistant.
Code mode: ${codeOn?"on":"off"}
Search mode: ${searchOn?"on":"off"}
Be concise and helpful.`;
}

async function streamAssistantResponse(payload,typingEl,willCode){
  let full="";
  const botEl=appendMsg("bot","",{raw:true});
  const bubble=botEl.querySelector(".bubble");
  const meta=botEl.querySelector(".mmeta");
  bubble.textContent="";
  meta.innerHTML=`${timeNow()} · ⏳ Generating...`;

  activeController=new AbortController();
  const res=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({...payload,stream:true}),
    signal:activeController.signal
  });

  if(!res.ok){
    const t=await res.text();
    throw new Error(t || `Server ${res.status}`);
  }
  if(!res.body) throw new Error("No stream body");

  if(typingEl && typingEl.parentNode) typingEl.remove();

  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let buffer="";

  while(true){
    const {value,done}=await reader.read();
    if(done) break;

    buffer += decoder.decode(value,{stream:true});
    const lines=buffer.split("\n");
    buffer=lines.pop()||"";

    for(const line of lines){
      if(!line.trim()) continue;
      let obj=null;
      try{ obj=JSON.parse(line); }catch{ continue; }

      if(obj.type==="delta"){
        full += obj.text || "";
        bubble.innerHTML=renderMd(full);
        messagesEl.scrollTop=messagesEl.scrollHeight;
      }else if(obj.type==="done"){
        meta.innerHTML=`${timeNow()}${willCode?" · 💻 Code":""} · 🔒 Secure <button class="meta-btn" onclick="copyAnswer(this)">Copy answer</button>`;
      }else if(obj.type==="error"){
        throw new Error(obj.error || "Streaming error");
      }
    }
  }

  if(!full.trim()) full="No response.";
  return full;
}

async function sendMessage(regenText=null){
  const text=(regenText ?? inputEl.value).trim();
  if(!text||loading) return;

  heroCard.classList.add("hide");
  if(!regenText){inputEl.value="";resize();charCountEl.textContent="0 / 2000"}

  loading=true;sendBtn.disabled=true;stopBtn.classList.remove("hide");regenBtn.classList.add("hide");

  appendMsg("user",text,{raw:true});
  history.push({role:"user",content:text});
  lastUserPrompt=text;
  persistCurrent();

  const willSearch=wantsSearch(text),willCode=wantsCode(text);
  const typingEl=appendMsg("bot","",{typing:true,searching:willSearch,memory:memory.length>0,coding:willCode});

  try{
    const payload={messages:history,web_search:willSearch,code_mode:codeOn,system:buildSystem()};
    let reply="";

    try{
      reply=await streamAssistantResponse(payload,typingEl,willCode);
    }catch(streamErr){
      if(typingEl && typingEl.parentNode) typingEl.remove();
      const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const data=await res.json();
      if(!res.ok) throw new Error(data.error||`Server ${res.status}`);
      reply=data.reply||"No response.";
      appendMsg("bot",reply,{coded:willCode,searched:!!data.search_used});
    }

    history.push({role:"assistant",content:reply});
    persistCurrent();
    regenBtn.classList.remove("hide");
  }catch(err){
    if(typingEl && typingEl.parentNode) typingEl.remove();
    appendMsg("bot",`⚠️ ${err.message||"Something went wrong."}`,{raw:true});
  }finally{
    loading=false;sendBtn.disabled=false;stopBtn.classList.add("hide");activeController=null;inputEl.focus();
  }
}

function stopGenerating(){
  if(activeController){activeController.abort();activeController=null;toast("Generation stopped");}
  loading=false;sendBtn.disabled=false;stopBtn.classList.add("hide");regenBtn.classList.remove("hide");
}
function regenerateLast(){
  if(!lastUserPrompt){toast("No previous prompt");return;}
  sendMessage(lastUserPrompt);
}

inputEl.addEventListener("input",()=>{resize();charCountEl.textContent=`${inputEl.value.length} / 2000`});
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}});

function systemPrefersDark(){return window.matchMedia("(prefers-color-scheme: dark)").matches}
function applyTheme(mode){
  const finalMode = mode==="auto" ? (systemPrefersDark()?"dark":"light") : mode;
  document.documentElement.setAttribute("data-theme",finalMode);
}
function initTheme(){
  const saved=localStorage.getItem(THEME_KEY)||"auto";
  applyTheme(saved);
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{if((localStorage.getItem(THEME_KEY)||"auto")==="auto")applyTheme("auto")});
}
function toggleThemeMode(){
  const cur=localStorage.getItem(THEME_KEY)||"auto";
  const next=cur==="auto"?"dark":cur==="dark"?"light":"auto";
  localStorage.setItem(THEME_KEY,next);
  applyTheme(next);
  toast(`Theme: ${next}`);
}

window.addEventListener("load",()=>{
  initTheme();
  if(!sessions.length){newChat()} else {currentSessionId=sessions[0].id;loadSession(currentSessionId)}
  renderHistory();
  inputEl.focus();
});
</script>
