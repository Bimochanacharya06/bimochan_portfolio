<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Bimochan AI — Portfolio Agent</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />

  <style>
    :root {
      --bg:        #212121;
      --bg-sidebar:#171717;
      --bg-hover:  #2a2a2a;
      --bg-active: #303030;
      --bg-input:  #2f2f2f;
      --bg-msg:    #2f2f2f;
      --border:    rgba(255,255,255,0.1);
      --fg:        #ececec;
      --fg2:       #8e8ea0;
      --fg3:       #565869;
      --accent:    #10a37f;
      --accent2:   #1a7f64;
      --accent-glow: rgba(16,163,127,0.15);
      --danger:    #ef4444;
      --warn:      #f59e0b;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    12px;
      --sidebar-w: 260px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}

    /* ─── LAYOUT ─── */
    .app{display:flex;height:100dvh;width:100vw}

    /* ─── SIDEBAR ─── */
    .sidebar{
      width:var(--sidebar-w);flex-shrink:0;
      background:var(--bg-sidebar);
      display:flex;flex-direction:column;
      border-right:1px solid var(--border);
      transition:transform 0.25s ease;
      z-index:100;position:relative;overflow:hidden;
    }
    .sidebar.hidden{transform:translateX(-100%);position:fixed;top:0;bottom:0;left:0}

    .sb-top{padding:12px 8px 8px;display:flex;flex-direction:column;gap:2px}

    .sb-btn{
      display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
      border:none;background:transparent;color:var(--fg2);font-family:var(--sans);
      font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.15s;text-align:left;width:100%;
    }
    .sb-btn:hover{background:var(--bg-hover);color:var(--fg)}
    .sb-btn.new-chat{
      color:var(--fg);font-weight:600;
      border:1px solid var(--border);
      margin-bottom:4px;
    }
    .sb-btn.new-chat:hover{background:var(--bg-hover)}
    .sb-btn svg{flex-shrink:0;width:16px;height:16px}

    .sb-section{font-size:11px;font-weight:600;color:var(--fg3);padding:14px 12px 6px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--mono)}

    .sb-history{flex:1;overflow-y:auto;padding:0 8px}
    .sb-history::-webkit-scrollbar{width:3px}
    .sb-history::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    .hist-item{
      display:flex;align-items:center;padding:8px 12px;border-radius:8px;
      border:none;background:transparent;color:var(--fg2);font-size:13px;
      font-family:var(--sans);font-weight:400;cursor:pointer;text-align:left;
      transition:all 0.15s;width:100%;overflow:hidden;gap:8px;
    }
    .hist-item:hover{background:var(--bg-hover);color:var(--fg)}
    .hist-item.active{background:var(--bg-active);color:var(--fg)}
    .hist-item .hi-icon{flex-shrink:0;opacity:0.6;font-size:14px}
    .hist-item .hi-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .sb-bottom{padding:8px;border-top:1px solid var(--border)}
    .profile-btn{
      display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
      border:none;background:transparent;color:var(--fg);font-family:var(--sans);
      font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;width:100%;
    }
    .profile-btn:hover{background:var(--bg-hover)}
    .avatar{
      width:30px;height:30px;border-radius:50%;
      background:linear-gradient(135deg,#10a37f,#1a7f64);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
    }

    /* ─── MAIN ─── */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}

    /* ─── TOPBAR ─── */
    .topbar{
      display:flex;align-items:center;padding:10px 16px;gap:10px;
      border-bottom:1px solid var(--border);flex-shrink:0;
      background:var(--bg);z-index:50;
    }
    .topbar-menu{
      width:36px;height:36px;border-radius:8px;border:none;
      background:transparent;color:var(--fg2);cursor:pointer;
      display:flex;align-items:center;justify-content:center;transition:all 0.15s;
    }
    .topbar-menu:hover{background:var(--bg-hover);color:var(--fg)}
    .topbar-title{flex:1;font-size:14px;font-weight:600;color:var(--fg2)}

    .model-badge{
      display:flex;align-items:center;gap:6px;padding:5px 12px;
      border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--fg2);font-size:12px;font-family:var(--mono);
      cursor:default;
    }
    .model-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}

    /* ─── CHAT AREA ─── */
    .chat-area{flex:1;overflow-y:auto;scroll-behavior:smooth}
    .chat-area::-webkit-scrollbar{width:6px}
    .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:6px}

    /* ─── WELCOME ─── */
    .welcome{
      max-width:680px;margin:0 auto;padding:80px 24px 40px;
      display:flex;flex-direction:column;align-items:center;gap:24px;
      animation:fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .welcome-logo{
      width:56px;height:56px;border-radius:16px;
      background:linear-gradient(135deg,#10a37f,#0d8a6a);
      display:flex;align-items:center;justify-content:center;font-size:26px;
      box-shadow:0 8px 32px rgba(16,163,127,0.3);
    }
    .welcome h1{font-size:28px;font-weight:700;text-align:center;letter-spacing:-0.02em}
    .welcome p{font-size:15px;color:var(--fg2);text-align:center;line-height:1.7;max-width:480px}

    .starter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:580px}
    .starter-card{
      background:var(--bg-msg);border:1px solid var(--border);border-radius:var(--radius);
      padding:14px 16px;cursor:pointer;transition:all 0.18s;text-align:left;
      display:flex;flex-direction:column;gap:6px;
    }
    .starter-card:hover{border-color:rgba(16,163,127,0.4);background:rgba(16,163,127,0.05);transform:translateY(-1px)}
    .starter-card .sc-icon{font-size:18px}
    .starter-card .sc-title{font-size:13px;font-weight:600;color:var(--fg)}
    .starter-card .sc-desc{font-size:12px;color:var(--fg2);line-height:1.5}

    /* ─── MESSAGES ─── */
    .messages{max-width:720px;margin:0 auto;padding:0 24px 120px;display:flex;flex-direction:column;gap:0}

    .msg-row{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .msg-row:last-child{border-bottom:none}
    .msg-row.user-row{display:flex;justify-content:flex-end}

    .user-bubble{
      background:var(--bg-msg);border:1px solid var(--border);border-radius:18px 18px 4px 18px;
      padding:12px 18px;max-width:75%;font-size:14.5px;line-height:1.7;word-break:break-word;
    }

    .bot-msg{display:flex;gap:14px;align-items:flex-start}
    .bot-av{
      width:28px;height:28px;border-radius:8px;flex-shrink:0;margin-top:2px;
      background:linear-gradient(135deg,#10a37f,#0d8a6a);
      display:flex;align-items:center;justify-content:center;font-size:14px;
      box-shadow:0 0 12px rgba(16,163,127,0.25);
    }
    .bot-content{flex:1;min-width:0}
    .bot-name{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px;font-family:var(--mono)}

    .bot-bubble{font-size:14.5px;line-height:1.8;word-break:break-word}
    .bot-bubble p{margin-bottom:12px}
    .bot-bubble p:last-child{margin-bottom:0}
    .bot-bubble h1,.bot-bubble h2,.bot-bubble h3{margin:20px 0 10px;font-weight:700;letter-spacing:-0.01em}
    .bot-bubble h1{font-size:20px}.bot-bubble h2{font-size:17px}.bot-bubble h3{font-size:15px}
    .bot-bubble ul,.bot-bubble ol{padding-left:22px;margin-bottom:12px}
    .bot-bubble li{margin-bottom:6px;line-height:1.7}
    .bot-bubble strong{color:var(--fg);font-weight:600}
    .bot-bubble em{color:var(--fg2)}
    .bot-bubble a{color:var(--accent);text-underline-offset:3px}
    .bot-bubble blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--fg2);margin:12px 0;font-style:italic}
    .bot-bubble table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;overflow:auto;display:block}
    .bot-bubble th{background:rgba(255,255,255,0.06);padding:9px 14px;border:1px solid var(--border);color:var(--fg);font-weight:600;text-align:left}
    .bot-bubble td{padding:8px 14px;border:1px solid var(--border);color:var(--fg2)}
    .bot-bubble code:not(.hljs){
      background:rgba(16,163,127,0.1);color:#4dd9b5;
      padding:2px 7px;border-radius:5px;font-family:var(--mono);font-size:12.5px;
    }
    .bot-bubble hr{border:none;border-top:1px solid var(--border);margin:16px 0}

    /* ─── CODE BLOCKS ─── */
    .code-wrap{margin:14px 0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#0d0d0d}
    .code-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 14px;background:#161616;border-bottom:1px solid var(--border);
    }
    .code-lang{font-size:11px;font-family:var(--mono);color:var(--fg2);font-weight:500;text-transform:lowercase}
    .code-acts{display:flex;gap:6px}
    .code-act-btn{
      border:none;background:rgba(255,255,255,0.05);color:var(--fg2);
      padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;
      transition:all 0.15s;font-family:var(--mono);display:flex;align-items:center;gap:5px;
    }
    .code-act-btn:hover{background:rgba(255,255,255,0.1);color:var(--fg)}
    .code-act-btn.run{color:var(--accent);background:rgba(16,163,127,0.08)}
    .code-act-btn.run:hover{background:rgba(16,163,127,0.15)}
    .code-wrap pre{margin:0;padding:16px;overflow-x:auto;background:transparent!important}
    .code-wrap code{font-family:var(--mono)!important;font-size:12.5px;line-height:1.65}
    .code-terminal{
      background:#0a0a0a;border-top:1px dashed rgba(255,255,255,0.08);
      padding:12px 16px;font-family:var(--mono);font-size:12px;
      color:var(--accent);display:none;white-space:pre-wrap;line-height:1.5;max-height:200px;overflow-y:auto;
    }
    .code-terminal.err{color:var(--danger)}
    .code-terminal::before{content:'$ ';opacity:0.4}

    /* ─── THINKING ─── */
    .thinking-row{display:flex;gap:14px;align-items:flex-start;padding:20px 0}
    .thinking-body{display:flex;flex-direction:column;gap:10px}
    .thinking-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg2)}
    .thinking-dots{display:flex;gap:4px}
    .thinking-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dotB 1.2s ease-in-out infinite}
    .thinking-dots span:nth-child(2){animation-delay:0.2s}
    .thinking-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dotB{0%,60%,100%{transform:translateY(0);opacity:0.35}30%{transform:translateY(-5px);opacity:1}}

    .step-log{
      background:rgba(16,163,127,0.06);border:1px solid rgba(16,163,127,0.15);
      border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;
    }
    .step-item{display:flex;align-items:center;gap:8px;font-size:12px;font-family:var(--mono)}
    .step-item.done{color:var(--accent)}
    .step-item.running{color:var(--fg2);animation:blink 1s ease-in-out infinite}
    .step-item.pending{color:var(--fg3)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
    .step-icon{width:16px;text-align:center;flex-shrink:0}

    /* ─── MSG ACTIONS ─── */
    .msg-acts{display:flex;gap:4px;margin-top:12px}
    .msg-act{
      border:none;background:transparent;color:var(--fg3);padding:5px 8px;
      border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.15s;
      display:flex;align-items:center;gap:5px;font-family:var(--sans);
    }
    .msg-act:hover{background:var(--bg-hover);color:var(--fg2)}
    .msg-act.copied{color:var(--accent)}

    /* ─── INPUT ZONE ─── */
    .input-zone{
      position:absolute;bottom:0;left:0;right:0;
      padding:16px 24px 24px;
      background:linear-gradient(0deg,var(--bg) 60%,transparent);
    }
    .input-wrap{max-width:720px;margin:0 auto;position:relative}

    .input-box{
      background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);
      padding:12px 50px 12px 16px;transition:all 0.2s;
      box-shadow:0 4px 24px rgba(0,0,0,0.3);
    }
    .input-box:focus-within{border-color:rgba(16,163,127,0.5);box-shadow:0 0 0 2px rgba(16,163,127,0.1),0 4px 24px rgba(0,0,0,0.3)}

    .input-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    #attach-badge{font-size:11px;color:var(--accent);font-family:var(--mono);display:none;background:rgba(16,163,127,0.1);padding:3px 9px;border-radius:6px}

    .ta-row{display:flex;align-items:flex-end;gap:8px}
    textarea{
      flex:1;background:transparent;border:none;color:var(--fg);
      font-family:var(--sans);font-size:14px;resize:none;outline:none;
      max-height:200px;line-height:1.6;padding:4px 0;
    }
    textarea::placeholder{color:var(--fg3)}

    .input-actions{display:flex;align-items:center;gap:6px}
    .ia-btn{
      border:none;background:transparent;color:var(--fg3);padding:6px;
      border-radius:8px;cursor:pointer;display:flex;align-items:center;
      justify-content:center;transition:all 0.15s;
    }
    .ia-btn:hover{background:var(--bg-hover);color:var(--fg2)}

    .send-btn{
      width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;
      background:var(--accent);color:#fff;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.18s;box-shadow:0 2px 12px rgba(16,163,127,0.3);
    }
    .send-btn:hover{background:var(--accent2);transform:scale(1.05)}
    .send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
    .send-btn.stop-mode{background:#ef4444;box-shadow:0 2px 12px rgba(239,68,68,0.3)}

    .input-hint{text-align:center;font-size:11px;color:var(--fg3);margin-top:10px}

    /* ─── PREVIEW MODAL ─── */
    .preview-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
      z-index:300;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .preview-overlay.show{opacity:1;pointer-events:all}
    .preview-modal{
      width:92%;max-width:1100px;height:88vh;
      background:#1a1a1a;border:1px solid var(--border);border-radius:16px;
      display:flex;flex-direction:column;overflow:hidden;
      transform:scale(0.96);transition:transform 0.25s ease;
    }
    .preview-overlay.show .preview-modal{transform:scale(1)}
    .preview-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 18px;border-bottom:1px solid var(--border);
    }
    .preview-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--fg2)}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .close-preview{
      background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
      color:var(--danger);padding:5px 14px;border-radius:7px;cursor:pointer;
      font-size:12px;font-family:var(--sans);font-weight:600;transition:all 0.15s;
    }
    .close-preview:hover{background:rgba(239,68,68,0.2)}
    .preview-iframe{flex:1;width:100%;border:none;background:#fff}

    /* ─── TOAST ─── */
    .toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(8px);
      background:var(--fg);color:var(--bg);padding:8px 18px;border-radius:20px;
      font-size:12px;font-weight:600;opacity:0;pointer-events:none;
      transition:all 0.22s;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ─── OVERLAY (mobile) ─── */
    .mob-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;
      display:none;
    }
    .mob-overlay.show{display:block}

    /* ─── MOBILE ─── */
    @media(max-width:768px){
      .sidebar{position:fixed;top:0;bottom:0;left:0;height:100dvh;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .starter-grid{grid-template-columns:1fr}
      .messages{padding:0 16px 120px}
      .input-zone{padding:12px 16px 20px}
      .welcome{padding:60px 16px 40px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <button class="sb-btn new-chat" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
      <button class="sb-btn" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        Close sidebar
      </button>
    </div>

    <div class="sb-section">Recent</div>
    <div class="sb-history" id="sb-history"></div>

    <div class="sb-bottom">
      <button class="profile-btn" onclick="clearAll()">
        <div class="avatar">B</div>
        <div style="flex:1;text-align:left">
          <div style="font-size:13px;font-weight:600">Bimochan Acharya</div>
          <div style="font-size:11px;color:var(--fg3);margin-top:1px">Portfolio Agent</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--fg3)"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">
    <header class="topbar">
      <button class="topbar-menu" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Bimochan AI</div>
      <div class="model-badge">
        <div class="model-dot"></div>
        <span style="font-size:11px">ArcCore</span>
      </div>
    </header>

    <div class="chat-area" id="chat-area">
      <div id="chat-container"></div>
    </div>

    <!-- INPUT -->
    <div class="input-zone">
      <div class="input-wrap">
        <div class="input-box">
          <div class="input-top">
            <span id="attach-badge">
              📎 <span id="attach-name"></span>
              <span style="cursor:pointer;color:var(--danger);margin-left:6px" onclick="clearFile()">✕</span>
            </span>
          </div>
          <div class="ta-row">
            <textarea id="chat-input" rows="1" placeholder="Message Bimochan AI…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
            <div class="input-actions">
              <button class="ia-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button class="send-btn" id="send-btn" onclick="handleSend()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="input-hint">Bimochan AI · Web search · Code · Real-time data · Portfolio agent</div>
      </div>
    </div>
  </main>
</div>
<input type="file" id="file-input" style="display:none" onchange="handleFile(this)" />
<div class="toast" id="toast"></div>

<div class="preview-overlay" id="preview-overlay">
  <div class="preview-modal">
    <div class="preview-head">
      <div class="preview-title"><div class="live-dot"></div>Live Preview</div>
      <button class="close-preview" onclick="closePreview()">✕ Close</button>
    </div>
    <iframe class="preview-iframe" id="preview-iframe" sandbox="allow-scripts allow-modals"></iframe>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const API = "/api/chat";
const SK_SESSIONS = "bimochan_sessions_v2";
const SK_MEMORY   = "bimochan_memory_v2";

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let sessions      = JSON.parse(localStorage.getItem(SK_SESSIONS) || "[]");
let memory        = JSON.parse(localStorage.getItem(SK_MEMORY)   || '{"language":"EN","taskCount":0}');
let currentId     = null;
let chatHistory   = [];
let isBusy        = false;
let abortCtrl     = null;
let attachedText  = "";
let attachedName  = "";
let pyodideReady  = null;
let workspaceFiles= [];

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
window.onload = () => {
  setupMarked();
  renderHistory();
  if (sessions.length > 0) loadSession(sessions[0].id);
  else newChat();
};

/* ════════════════════════════════════════
   MARKED SETUP — FIX: sync renderer
════════════════════════════════════════ */
function setupMarked() {
  const renderer = new marked.Renderer();
  renderer.code = function(code, lang) {
    const language = (lang || "text").toLowerCase();
    const validLang = hljs.getLanguage(language) ? language : 'plaintext';
    let highlighted;
    try { highlighted = hljs.highlight(code, { language: validLang }).value; }
    catch { highlighted = code.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // FIX: Safe base64 encoding
    const b64 = safeB64Encode(code);
    const ext  = {python:'py',py:'py',javascript:'js',js:'js',html:'html',css:'css'}[language] || 'txt';
    const icon = {py:'🐍',js:'⚡',html:'🌐',css:'🎨'}[ext] || '📄';
    workspaceFiles.push({ name:`file_${Date.now()}.${ext}`, content:code, icon, meta:`${language} · ${code.split('\n').length} lines` });

    let acts = `<button class="code-act-btn" onclick="copyCode('${b64}',this)">📋 Copy</button>`;
    if (['html','xml'].includes(validLang) || code.includes('<html') || code.includes('<!DOCTYPE')) {
      acts = `<button class="code-act-btn run" onclick="openPreview('${b64}')">👁 Preview</button>` + acts;
    } else if (['python','py','javascript','js'].includes(validLang)) {
      acts = `<button class="code-act-btn run" onclick="runCode(this,'${b64}','${validLang}')">▶ Run</button>` + acts;
    }

    return `<div class="code-wrap">
      <div class="code-header">
        <span class="code-lang">${language}</span>
        <div class="code-acts">${acts}</div>
      </div>
      <pre><code class="hljs language-${validLang}">${highlighted}</code></pre>
      <div class="code-terminal"></div>
    </div>`;
  };
  marked.use({ renderer, breaks: true, gfm: true });
}

/* ════════════════════════════════════════
   SAFE B64 — FIX: handles Unicode properly
════════════════════════════════════════ */
function safeB64Encode(str) {
  try { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_,p) => String.fromCharCode('0x'+p))); }
  catch { return btoa(str.replace(/[^\x00-\x7F]/g,'?')); }
}
function safeB64Decode(b64) {
  try { return decodeURIComponent(Array.from(atob(b64)).map(c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('')); }
  catch { return atob(b64); }
}

/* ════════════════════════════════════════
   SESSIONS
════════════════════════════════════════ */
function saveSessions() {
  localStorage.setItem(SK_SESSIONS, JSON.stringify(sessions.slice(0,30)));
  localStorage.setItem(SK_MEMORY, JSON.stringify(memory));
  renderHistory();
}

function newChat() {
  if (isBusy) stopGen();
  currentId = "chat_" + Date.now();
  chatHistory = [];
  workspaceFiles = [];
  sessions.unshift({ id: currentId, title: "New chat", messages: [], agent: null });
  if (sessions.length > 30) sessions.pop();
  renderChat();
  saveSessions();
  closeSidebar();
  document.getElementById("topbar-title").textContent = "Bimochan AI";
}

function loadSession(id) {
  if (isBusy) stopGen();
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  currentId = id;
  chatHistory = [...s.messages];
  renderChat();
  renderHistory();
  closeSidebar();
  document.getElementById("topbar-title").textContent = s.title !== "New chat" ? s.title : "Bimochan AI";
}

function updateSession(agentName) {
  const s = sessions.find(x => x.id === currentId);
  if (!s) return;
  s.messages = [...chatHistory];
  if (agentName) s.agent = agentName;
  const firstUser = chatHistory.find(m => m.role === 'user');
  if (firstUser && s.title === "New chat") {
    s.title = firstUser.content.slice(0,40).replace(/\[.*?\]/g,'').trim() + (firstUser.content.length > 40 ? '…' : '');
    document.getElementById("topbar-title").textContent = s.title;
  }
  saveSessions();
}

function clearAll() {
  if (!confirm("Clear all chats and data?")) return;
  sessions = []; memory = { language:"EN", taskCount:0 };
  localStorage.removeItem(SK_SESSIONS); localStorage.removeItem(SK_MEMORY);
  newChat();
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function renderHistory() {
  const el = document.getElementById("sb-history");
  el.innerHTML = sessions
    .filter(s => s.messages.length > 0 || s.id === currentId)
    .map(s => `
      <button class="hist-item ${s.id === currentId ? 'active' : ''}" onclick="loadSession('${s.id}')">
        <span class="hi-icon">${agentIcon(s.agent)}</span>
        <span class="hi-title">${esc(s.title)}</span>
      </button>`)
    .join('');
}

function agentIcon(agent) {
  const m = {codeCore:'💻',researchCore:'🔍',writeCore:'✍️',legalCore:'⚖️',dataCore:'📊',stratCore:'🚀'};
  return m[agent] || '💬';
}

function renderChat() {
  const container = document.getElementById("chat-container");
  container.innerHTML = '';

  if (chatHistory.length === 0) {
    renderWelcome();
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'messages';

  chatHistory.forEach(m => {
    if (m.role === 'user') wrap.appendChild(buildUserMsg(m.content));
    else wrap.appendChild(buildBotMsg(m.content, m.progressLog));
  });
  container.appendChild(wrap);
  scrollBottom();
}

function renderWelcome() {
  const starters = [
    { icon:'👤', title:'Who is Bimochan?', desc:'Learn about skills, projects, and background', q:'Who is Bimochan Acharya? Tell me about his skills, projects, and what he has built.' },
    { icon:'🔍', title:'Web search', desc:'Search the internet for real-time information', q:'What are the latest AI developments this week? Search the web.' },
    { icon:'💻', title:'Write code', desc:'Build apps, scripts, or solve problems', q:'Build me a beautiful animated landing page for a tech startup in HTML.' },
    { icon:'📊', title:'Real-time data', desc:'Market prices, news, crypto, weather…', q:'What is Bitcoin\'s price right now and recent trend?' },
  ];
  document.getElementById("chat-container").innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">⚡</div>
      <h1>Bimochan AI</h1>
      <p>Portfolio agent powered by ArcCore. Ask anything — web search, code, real-time data, or learn about Bimochan.</p>
      <div class="starter-grid">
        ${starters.map(s => `
          <div class="starter-card" onclick="quickSend(${JSON.stringify(s.q)})">
            <div class="sc-icon">${s.icon}</div>
            <div class="sc-title">${s.title}</div>
            <div class="sc-desc">${s.desc}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function getMessagesWrap() {
  let wrap = document.getElementById("chat-container").querySelector('.messages');
  if (!wrap) {
    document.getElementById("chat-container").innerHTML = '';
    wrap = document.createElement('div');
    wrap.className = 'messages';
    document.getElementById("chat-container").appendChild(wrap);
  }
  return wrap;
}

function buildUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-row user-row';
  div.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
  return div;
}

function buildBotMsg(text, progressLog, isLive=false) {
  const div = document.createElement('div');
  div.className = 'msg-row';
  const b64 = safeB64Encode(text);

  let rendered = '';
  try { rendered = marked.parse(text); }
  catch { rendered = `<p>${esc(text)}</p>`; }

  let logHTML = '';
  if (progressLog && progressLog.length > 0) {
    logHTML = `<div class="step-log" style="margin-bottom:12px">
      ${progressLog.map(l => `
        <div class="step-item ${l.status}">
          <span class="step-icon">${l.status==='done'?'✓':l.status==='running'?'⚡':'○'}</span>
          <span>${esc(l.message)}</span>
        </div>`).join('')}
    </div>`;
  }

  div.innerHTML = `
    <div class="bot-msg">
      <div class="bot-av">⚡</div>
      <div class="bot-content">
        <div class="bot-name">ARCCORE</div>
        ${logHTML}
        <div class="bot-bubble">${rendered}</div>
        ${!isLive ? `<div class="msg-acts">
          <button class="msg-act" onclick="copyMsg('${b64}',this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="msg-act" onclick="retryLast()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
            Retry
          </button>
        </div>` : ''}
      </div>
    </div>`;
  return div;
}

/* ════════════════════════════════════════
   THINKING UI
════════════════════════════════════════ */
function buildThinkingEl() {
  const div = document.createElement('div');
  div.className = 'msg-row';
  div.id = 'thinking-row';
  div.innerHTML = `
    <div class="bot-msg">
      <div class="bot-av">⚡</div>
      <div class="bot-content">
        <div class="bot-name">ARCCORE</div>
        <div class="thinking-status">
          <div class="thinking-dots"><span></span><span></span><span></span></div>
          <span id="thinking-label">Thinking…</span>
        </div>
      </div>
    </div>`;
  return div;
}

const THINKING_STEPS = [
  { label: 'Analyzing your request…', delay: 0 },
  { label: 'Searching the web…', delay: 1400 },
  { label: 'Processing results…', delay: 3000 },
  { label: 'Generating response…', delay: 5000 },
];
let thinkingTimers = [];

function startThinking(wrap) {
  const el = buildThinkingEl();
  wrap.appendChild(el);
  scrollBottom();
  const lbl = document.getElementById('thinking-label');
  THINKING_STEPS.forEach(s => {
    const t = setTimeout(() => { if (lbl) lbl.textContent = s.label; }, s.delay);
    thinkingTimers.push(t);
  });
}

function stopThinking() {
  thinkingTimers.forEach(clearTimeout);
  thinkingTimers = [];
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

/* ════════════════════════════════════════
   SEND & API — FIXED
════════════════════════════════════════ */
function quickSend(text) { document.getElementById('chat-input').value = text; handleSend(); }
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }
function stopGen() { if (abortCtrl) abortCtrl.abort(); }

async function handleSend() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && !attachedText) return;
  if (isBusy) return;

  input.value = '';
  autoResize(input);

  let payload = text;
  if (attachedText) {
    payload = `[File attached: ${attachedName}]\n\`\`\`\n${attachedText}\n\`\`\`\n\n${text || 'Analyze this file.'}`;
    clearFile();
  }

  chatHistory.push({ role: 'user', content: payload });
  updateSession(null);

  const wrap = getMessagesWrap();
  wrap.appendChild(buildUserMsg(payload));

  await runAPI(wrap);
}

async function runAPI(wrap) {
  isBusy = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.classList.add('stop-mode');
  sendBtn.onclick = stopGen;
  sendBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`;

  startThinking(wrap);
  abortCtrl = new AbortController();

  try {
    // FIX: Send only role+content to API (clean history)
    const apiMessages = chatHistory.map(m => ({ role: m.role, content: m.content }));

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortCtrl.signal,
      body: JSON.stringify({ messages: apiMessages }),
    });

    // FIX: Safe JSON parse
    let data;
    try { data = await res.json(); }
    catch { throw new Error('Invalid JSON response from server'); }

    // FIX: Handle both direct response and nested body formats
    let reply = data.reply;
    if (!reply && data.body) {
      try { reply = (typeof data.body === 'string' ? JSON.parse(data.body) : data.body).reply; }
      catch { /* ignore */ }
    }
    if (!reply && data.error) throw new Error(data.error);
    if (!reply) throw new Error('Empty response from ArcCore');

    stopThinking();
    chatHistory.push({ role: 'assistant', content: reply });
    updateSession(data.intent || null);
    if (data.language) memory.language = data.language;
    memory.taskCount = (memory.taskCount || 0) + 1;
    saveSessions();

    wrap.appendChild(buildBotMsg(reply, data.progressLog || null));
    scrollBottom();

  } catch (err) {
    stopThinking();
    const msg = err.name === 'AbortError'
      ? '*Task stopped.*'
      : `**Error:** ${err.message}\n\n*Check that your API backend is running at \`${API}\`.*`;
    wrap.appendChild(buildBotMsg(msg, null));
    scrollBottom();
    if (err.name !== 'AbortError') chatHistory.pop(); // don't save errored user msg
  } finally {
    isBusy = false; abortCtrl = null;
    sendBtn.classList.remove('stop-mode');
    sendBtn.onclick = handleSend;
    sendBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
    document.getElementById('chat-input').focus();
  }
}

async function retryLast() {
  if (isBusy || chatHistory.length === 0) return;
  if (chatHistory[chatHistory.length-1].role === 'assistant') chatHistory.pop();
  renderChat();
  const wrap = getMessagesWrap();
  await runAPI(wrap);
}

/* ════════════════════════════════════════
   CODE ACTIONS
════════════════════════════════════════ */
async function copyCode(b64, btn) {
  const text = safeB64Decode(b64);
  try { await navigator.clipboard.writeText(text); }
  catch { /* fallback */ }
  btn.textContent = '✓ Copied';
  setTimeout(() => btn.textContent = '📋 Copy', 2000);
}

async function copyMsg(b64, btn) {
  const text = safeB64Decode(b64);
  try { await navigator.clipboard.writeText(text); btn.classList.add('copied'); btn.textContent = '✓ Copied'; }
  catch { toast('Copy failed'); }
  setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; }, 2000);
}

function openPreview(b64) {
  document.getElementById('preview-iframe').srcdoc = safeB64Decode(b64);
  document.getElementById('preview-overlay').classList.add('show');
}
function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
  document.getElementById('preview-iframe').srcdoc = '';
}

async function initPyodide() {
  if (!window.loadPyodide) {
    await new Promise(res => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
      s.onload = res;
      document.head.appendChild(s);
    });
  }
  const py = await loadPyodide();
  py.runPython(`import sys,io\nsys.stdout=io.StringIO()\nsys.stderr=io.StringIO()`);
  return py;
}

async function runCode(btn, b64, lang) {
  const code = safeB64Decode(b64);
  const terminal = btn.closest('.code-wrap').querySelector('.code-terminal');
  terminal.style.display = 'block';
  terminal.classList.remove('err');

  if (lang === 'js' || lang === 'javascript') {
    let out = ''; const og = console.log;
    try {
      console.log = (...a) => { out += a.join(' ') + '\n'; };
      // FIX: Use Function constructor safely
      const fn = new Function(code);
      const r = fn();
      if (r !== undefined) out += '→ ' + r;
      terminal.textContent = out || '(no output)';
    } catch(e) { terminal.classList.add('err'); terminal.textContent = e.toString(); }
    finally { console.log = og; }
    return;
  }

  if (lang === 'py' || lang === 'python') {
    terminal.textContent = 'Loading Python runtime…';
    try {
      if (!pyodideReady) pyodideReady = initPyodide();
      const py = await pyodideReady;
      py.runPython(`sys.stdout.truncate(0);sys.stdout.seek(0);sys.stderr.truncate(0);sys.stderr.seek(0)`);
      await py.runPythonAsync(code);
      const out = py.runPython('sys.stdout.getvalue()');
      const err = py.runPython('sys.stderr.getvalue()');
      if (err) { terminal.classList.add('err'); terminal.textContent = err; }
      else terminal.textContent = out || '(no output)';
    } catch(e) { terminal.classList.add('err'); terminal.textContent = e.toString(); }
  }
}

/* ════════════════════════════════════════
   FILE ATTACH
════════════════════════════════════════ */
function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  if (file.size > 200000) { toast('File too large (max 200KB)'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    attachedText = e.target.result; attachedName = file.name;
    document.getElementById('attach-name').textContent = attachedName;
    document.getElementById('attach-badge').style.display = 'inline-flex';
  };
  reader.readAsText(file); input.value = '';
}
function clearFile() {
  attachedText = ''; attachedName = '';
  document.getElementById('attach-badge').style.display = 'none';
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mob-overlay');
  if (window.innerWidth < 769) {
    sb.classList.toggle('open');
    ov.classList.toggle('show');
  } else {
    sb.classList.toggle('hidden');
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
}

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function autoResize(ta) { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,200)+'px'; }
function scrollBottom() { const ca=document.getElementById('chat-area'); requestAnimationFrame(()=>{ ca.scrollTop=ca.scrollHeight; }); }
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
