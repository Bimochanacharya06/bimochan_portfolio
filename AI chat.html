<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #1a1a1a; color: #fff; }
        .chatbox { max-width: 600px; margin: auto; background: #222; padding: 20px; border-radius: 10px; }
        .messages { min-height: 200px; margin-bottom: 20px; }
        .user { color: #3b82f6; }
        .bot { color: #38bdf8; }
        input, button { padding: 10px; font-size: 1em; }
        button { background: #3b82f6; color: #fff; border: none; border-radius: 5px; }
        input { width: 70%; border-radius: 5px; border: 1px solid #333; background: #181818; color: #fff; }
    </style>
</head>
<body>
    <div class="chatbox">
        <h2>AI Chatbot</h2>
        <div class="messages" id="messages"></div>
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        function appendMessage(text, sender) {
            const messages = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = sender;
            msgDiv.textContent = sender === 'user' ? 'You: ' + text : 'Bot: ' + text;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            appendMessage(message, 'user');
            input.value = '';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                appendMessage(data.response, 'bot');
            });
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
